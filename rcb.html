<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>
<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
3000
)

camera.position.z = 180

const renderer = new THREE.WebGLRenderer({antialias:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const controls = new THREE.OrbitControls(camera,renderer.domElement)
controls.enableDamping=true

/* LIGHT */

const light=new THREE.PointLight(0xffffff,1.4)
light.position.set(100,100,100)
scene.add(light)

/* LABEL CREATION FUNCTION */

function createLabel(text){

const canvas=document.createElement("canvas")
const context=canvas.getContext("2d")

canvas.width=256
canvas.height=128

context.fillStyle="white"
context.font="28px Arial"
context.textAlign="center"
context.fillText(text,128,64)

const texture=new THREE.CanvasTexture(canvas)

const material=new THREE.SpriteMaterial({map:texture})

const sprite=new THREE.Sprite(material)

sprite.scale.set(10,5,1)

return sprite

}

/* NODE STYLE */

const nodeGeometry=new THREE.SphereGeometry(1.4,32,32)

const nodeMaterial=new THREE.MeshStandardMaterial({
color:0x7594fa,
emissive:0x7594fa,
emissiveIntensity:0.9
})

const labels=[
"AI","ML","DL","CNN","RNN","LLM","NLP","CV","GPT",
"BERT","Tensor","CUDA","PyTorch","API","Agent",
"VectorDB","Embedding","Inference","Training",
"Dataset","Token","Attention","Transformer",
"GPU","TPU","Model","Prediction","Automation",
"Pipeline","Gradient","Backprop","Prompt",
"FineTune","Search","Speech","Vision"
]

const nodes=[]

/* CREATE BRAIN SHAPE */

for(let i=0;i<80;i++){

const node=new THREE.Mesh(nodeGeometry,nodeMaterial)

const angle=i*0.3
const radius=70+Math.sin(i*0.5)*20

node.position.set(
Math.cos(angle)*radius,
Math.sin(angle*1.3)*40,
(Math.random()-0.5)*40
)

node.userData.label=labels[Math.floor(Math.random()*labels.length)]

const label=createLabel(node.userData.label)
label.position.set(0,3,0)

node.add(label)

scene.add(node)
nodes.push(node)

}

/* CONNECTIONS */

function connect(a,b){

const material=new THREE.LineBasicMaterial({
color:0x9d75fa,
transparent:true,
opacity:0.6
})

const points=[]

points.push(nodes[a].position)
points.push(nodes[b].position)

const geometry=new THREE.BufferGeometry().setFromPoints(points)

const line=new THREE.Line(geometry,material)

scene.add(line)

/* FLOW PARTICLE */

const particleGeometry=new THREE.SphereGeometry(0.5,16,16)
const particleMaterial=new THREE.MeshBasicMaterial({color:0xffffff})

const particle=new THREE.Mesh(particleGeometry,particleMaterial)

particle.start=nodes[a].position
particle.end=nodes[b].position
particle.t=Math.random()

scene.add(particle)

flowParticles.push(particle)

}

const flowParticles=[]

for(let i=0;i<200;i++){

const a=Math.floor(Math.random()*nodes.length)
const b=Math.floor(Math.random()*nodes.length)

connect(a,b)

}

/* STAR BACKGROUND */

const starsGeometry=new THREE.BufferGeometry()
const starVertices=[]

for(let i=0;i<6000;i++){

starVertices.push(
(Math.random()-0.5)*4000,
(Math.random()-0.5)*4000,
(Math.random()-0.5)*4000
)

}

starsGeometry.setAttribute(
'position',
new THREE.Float32BufferAttribute(starVertices,3)
)

const starsMaterial=new THREE.PointsMaterial({
color:0xffffff,
size:0.8
})

const starField=new THREE.Points(starsGeometry,starsMaterial)
scene.add(starField)

/* SCROLL SPEED CONTROL */

let speed=1

window.addEventListener("wheel",(e)=>{

speed+=e.deltaY*-0.0005

if(speed<0.2) speed=0.2
if(speed>5) speed=5

})

/* ANIMATION */

function animate(){

requestAnimationFrame(animate)

controls.update()

scene.rotation.y+=0.0006*speed

flowParticles.forEach(p=>{

p.t+=0.01*speed

if(p.t>1) p.t=0

p.position.lerpVectors(p.start,p.end,p.t)

})

nodes.forEach(n=>{

n.material.emissiveIntensity=
0.7+Math.sin(Date.now()*0.003+n.position.x)*0.4

})

/* BILLBOARD LABELS (always face camera) */

nodes.forEach(node=>{
node.children.forEach(label=>{
label.quaternion.copy(camera.quaternion)
})
})

starField.rotation.y+=0.0002

renderer.render(scene,camera)

}

animate()

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

})



document.querySelectorAll("a").forEach(link => {

link.addEventListener("click", function(e){

const target = this.getAttribute("href")

if(target.endsWith(".html")){

e.preventDefault()

const overlay = document.getElementById("loadingOverlay")
overlay.classList.add("active")

setTimeout(()=>{
window.location.href = target
},1000)

}

})

})


</script>
<div id="loadingOverlay">
  <div class="loader"></div>
</div>
